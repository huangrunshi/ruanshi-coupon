}

// ============ 消息 ============
function addBotMsg(html) {
  var wrap = document.createElement("div");
  wrap.className = "bubble-wrap";
  wrap.innerHTML = '<div class="avatar">🎫</div><div class="bubble bot">' + html + '</div>';
  document.getElementById("messages").appendChild(wrap);
  scrollToBottom();
}

function addUserMsg(text) {
  var wrap = document.createElement("div");
  wrap.className = "bubble-wrap user";
  wrap.innerHTML = '<div class="bubble user">' + text + '</div><div class="avatar">🙋</div>';
  document.getElementById("messages").appendChild(wrap);
  scrollToBottom();
}

function addButtons(btns) {
  var wrap = document.createElement("div");
  wrap.className = "quick-btns";
  for (var i = 0; i < btns.length; i++) {
    var btn = document.createElement("button");
    btn.className = "quick-btn";
    btn.textContent = btns[i].label;
    btn.onclick = btns[i].action;
    wrap.appendChild(btn);
  }
  document.getElementById("messages").appendChild(wrap);
  scrollToBottom();
}

function scrollToBottom() {
  var m = document.getElementById("messages");
  setTimeout(function() { m.scrollTop = m.scrollHeight; }, 50);
}

// ============ 价格对比面板 ============
function showComparePanel(product) {
  var discount = Math.round((1 - product.price/product.official) * 100);
  var saveMoney = (product.official - product.price).toFixed(1);
  
  var html = '<div class="compare-panel">';
  html += '<div class="compare-title">📊 价格对比 <span class="badge">省' + discount + '%</span></div>';
  html += '<div class="compare-row"><span class="compare-label">官方价</span><span class="compare-official">¥' + product.official + '</span></div>';
  html += '<div class="compare-row"><span class="compare-label">' + PLATFORM_NAME + '价</span><span class="compare-platform">¥' + product.price + '</span></div>';
  html += '<div class="compare-row"><span class="compare-label">节省</span><span class="compare-save">¥' + saveMoney + '</span></div>';
  html += '</div>';
  addBotMsg(html);
}

// ============ 产品卡片 ============
function showProducts(list, title) {
  if (list.length === 0) {
    addBotMsg("😢 暂无符合条件的权益商品");
    return;
  }
  var html = title ? '<div style="margin:8px 0 12px;font-weight:600;color:#FF6B6B">'+title+'</div>' : '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var hotTag = p.hot ? '<span class="tag hot">🔥 热卖</span>' : '';
    var recTag = p.recommend ? '<span class="tag recommend">⭐ ' + p.recommend + '</span>' : '';
    var discount = Math.round((1 - p.price/p.official) * 100);
    var saveMoney = (p.official - p.price).toFixed(1);
    
    html += '<div class="product-card" id="prod-' + p.id + '">';
    html += '<div class="product-name">' + p.name + hotTag + recTag + '</div>';
    html += '<div class="price-compare">';
    html += '<span class="official">官方价 ¥' + p.official + '</span>';
    html += '<span class="save">省¥' + saveMoney + '</span>';
    html += '</div>';
    html += '<div class="product-price">' + p.price + '元 <span>/' + p.period + '</span></div>';
    html += '<div class="product-desc">' + p.desc + '</div>';
    html += '<div class="product-tags"><span class="tag">' + p.sub + '</span><span class="tag">' + p.period + '</span><span class="tag">评分' + p.score + '</span></div>';
    html += '<div class="product-footer">';
    html += '<button class="compare-btn" onclick="showCompare(' + "'" + p.id + "'" + ')">📊 比价</button>';
    html += '<button class="order-btn" onclick="openQR()">🎫 联系购买</button>';
    html += '</div>';
    html += '</div>';
  }
  addBotMsg(html);
}

function showCompare(id) {
  var p = PRODUCTS.find(function(x) { return x.id === id; });
  if (p) showComparePanel(p);
}

  return PRODUCTS.slice().sort(function(a, b) {
    var scoreA = a.score * (1 - a.price/a.official);
    var scoreB = b.score * (1 - b.price/b.official);
    return scoreB - scoreA;
  }).slice(0, 5);
}

function showHotRecommendations() {
  var hotProducts = getHotProducts();
  var recommendProducts = getRecommendProducts();
  
  addBotMsg("🔥 <b>今日热门推荐</b>");
  showProducts(hotProducts.slice(0, 3));
  
  setTimeout(function() {
    addBotMsg("⭐ <b>性价比之选</b>（综合评分+折扣力度）");
    showProducts(recommendProducts.slice(0, 3));
  }, 500);
}

// ============ FAQ 搜索 ============
function searchFAQ(keyword) {
  var kw = keyword.toLowerCase();
  var results = FAQS.filter(function(f) {
    return f.q.indexOf(kw) >= 0 || f.a.indexOf(kw) >= 0;
  });
  return results;
}

function showFAQ(results, keyword) {
  if (results.length === 0) {
    addBotMsg("🔍 没有找到关于「" + keyword + "」的相关问题<br><br>您可以：<br>① 联系润石咨询<br>② 换个关键词试试");
    return;
  }
  var html = '<b>🔍 找到 ' + results.length + ' 个相关问题：</b><br><br>';
  for (var i = 0; i < results.length && i < 3; i++) {
    html += '<div class="faq-card">';
    html += '<div class="faq-q">Q: ' + results[i].q + '</div>';
    html += '<div class="faq-a">A: ' + results[i].a + '</div>';
    html += '</div>';
  }
  addBotMsg(html);
}

// ============ 分类选择 ============
function selectCategory(catId) {
  currentCategory = catId;
  var cat = CATEGORIES.find(function(c) { return c.id === catId; });
  var text = cat ? cat.name : "全部";
  addUserMsg("我想看 " + text);
  
  var filtered = catId === "all" ? PRODUCTS : PRODUCTS.filter(function(p) { return p.category === catId; });
  
  // 按热门+评分排序
  filtered.sort(function(a, b) { return (b.hot?100:0) + b.score - ((a.hot?100:0) + a.score); });
  
  addBotMsg("📦 <b>" + cat.name + "</b>（共" + filtered.length + "款，按热门程度排序）");
  showProducts(filtered.slice(0, 6));
  
  if (filtered.length > 6) {
    setTimeout(function() {
      addBotMsg("更多" + cat.name + "...");
      showProducts(filtered.slice(6));
    }, 500);
  }
}

// ============ 搜索 ============
function searchProducts(keyword) {
  if (!keyword) return;
  
  // 先搜索FAQ
  var faqResults = searchFAQ(keyword);
  if (faqResults.length > 0) {
    showFAQ(faqResults, keyword);
    return;
  }
  
  // 搜索产品
  var kw = keyword.toLowerCase();
  var results = PRODUCTS.filter(function(p) {
    return p.name.toLowerCase().indexOf(kw) >= 0 ||
           p.category.toLowerCase().indexOf(kw) >= 0 ||
           p.sub.toLowerCase().indexOf(kw) >= 0 ||
           p.desc.toLowerCase().indexOf(kw) >= 0 ||
           (p.recommend && p.recommend.toLowerCase().indexOf(kw) >= 0);
  });
  
  if (results.length === 0) {
    addBotMsg("🔍 没有找到「" + keyword + "」相关商品或问题<br><br>试试这些：<br>• 爱奇艺、腾讯、美团<br>• 怎么用、充值、售后<br>• 热门、推荐、便宜");
    addButtons([
      {label:"🔥 热门推荐", action:showHotRecommendations},
      {label:"📋 查看全部", action:function(){ selectCategory("all"); }}
    ]);
  } else {
    results.sort(function(a, b) { return b.score - a.score; });
    addBotMsg("🔍 找到 <b>" + results.length + "</b> 个相关商品（按评分排序）：");
    showProducts(results.slice(0, 6));
  }
}

// ============ 意图识别 ============
function understandIntent(text) {
  var t = text.toLowerCase();
  
  // 热门推荐
  if (/热门|推荐|热卖|爆款|最好|划算/.test(t)) {
    return "hot";
  }
  // 价格对比
  if (/比价|对比|便宜|优惠|折扣|省|多少钱|价格/.test(t)) {
    return "compare";
  }
  // 常见问题
  var faqKeywords = {充:1,怎么用:1,充值:1,使用:1,到期:1,续费:1,退:1,开发票:1,支付:1,查询:1,售后:1,失败:1};
  for (var k in faqKeywords) {
    if (t.indexOf(k) >= 0) return "faq";
  }
  // 分类
  for (var k in {视频:1,爱奇艺:1,腾讯:1,优酷:1,b站:1,外卖:1,美团:1,饿了么:1,瑞幸:1,咖啡:1,音乐:1,网易云:1,游戏:1,点卡:1,办公:1,wps:1,出行:1,滴滴:1}) {
    if (t.indexOf(k) >= 0) return "category";
  }
  return "search";
}

// ============ 发送处理 ============
function handleSend() {
  var input = document.getElementById("userInput");
  var text = input.value.trim();
  if (!text) return;
  input.value = "";
  
  addUserMsg(text);
  
  var intent = understandIntent(text);
  
  switch(intent) {
    case "hot":
      showHotRecommendations();
      break;
    case "compare":
      addBotMsg("📊 <b>热门商品价格对比</b><br>以下是各平台热销商品的价格对比：");
      showProducts(getHotProducts().slice(0, 3));
      break;
    case "faq":
      var faqResults = searchFAQ(text);
      if (faqResults.length > 0) {
        showFAQ(faqResults, text);
      } else {
        searchProducts(text);
      }
      break;
    case "category":
      // 找到对应分类
      for (var k in {视频会员:1,爱奇艺:1,腾讯视频:1,优酷:1,"b站":1}) {
        if (text.indexOf(k) >= 0) { selectCategory("视频会员"); return; }
      }
      for (var k in {外卖:1,美团:1,饿了么:1,瑞幸:1,咖啡:1,餐饮:1}) {
        if (text.indexOf(k) >= 0) { selectCategory("外卖餐饮"); return; }
      }
      for (var k in {音乐:1,网易云:1,qq音乐:1}) {
        if (text.indexOf(k) >= 0) { selectCategory("音乐会员"); return; }
      }
      for (var k in {出行:1,滴滴:1,生活:1}) {
        if (text.indexOf(k) >= 0) { selectCategory("生活服务"); return; }
      }
      for (var k in {办公:1,wps:1}) {
        if (text.indexOf(k) >= 0) { selectCategory("办公效率"); return; }
      }
      for (var k in {游戏:1,点卡:1}) {
        if (text.indexOf(k) >= 0) { selectCategory("游戏娱乐"); return; }
      }
      searchProducts(text);
      break;
    default:
      searchProducts(text);
  }
}

// ============ 初始化 ============
document.getElementById("sendBtn").onclick = handleSend;
document.getElementById("userInput").onkeydown = function(e) {
  if (e.key === "Enter") handleSend();
};

  setTimeout(function() {
    addBotMsg("🔥 <b>今日热门推荐</b>，要不要看看？");
    showProducts(getHotProducts().slice(0, 2));
    addButtons([
      {label:"🔥 看热门推荐", action:showHotRecommendations},
      {label:"📂 浏览全部分类", action:function(){ selectCategory("all"); }},
      {label:"❓ 常见问题", action:function(){ searchProducts("怎么用"); }}
    ]);
  }, 600);
}, 500);
</script>
