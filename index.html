function openQR(){document.getElementById('qrModal').classList.add('show');}
function closeQR(){document.getElementById('qrModal').classList.remove('show');}
document.getElementById('qrModal').addEventListener('click',function(e){if(e.target===this)closeQR();});

function switchMode(mode){
  currentMode=mode;
  document.getElementById('modeAI').classList.toggle('active',mode==='ai');
  document.getElementById('modeSimple').classList.toggle('active',mode==='simple');
  if(mode==='simple'){
    showSimpleMode();
  }else{
    addBotMsg('🤖 已切换到AI对话模式，可以直接描述您的需求~',true);
  }
}

function addBotMsg(html,isAI){
  var wrap=document.createElement("div");
  wrap.className="bubble-wrap";
  var avatar=isAI?'<div class="avatar ai">🤖</div>':'<div class="avatar">🎫</div>';
  wrap.innerHTML=avatar+'<div class="bubble '+(isAI?'ai':'bot')+'">'+html+'</div>';
  document.getElementById("messages").appendChild(wrap);
  scrollToBottom();
}

function addUserMsg(text){
  var wrap=document.createElement("div");
  wrap.className="bubble-wrap user";
  wrap.innerHTML='<div class="bubble user">'+text+'</div><div class="avatar">🙋</div>';
  document.getElementById("messages").appendChild(wrap);
  scrollToBottom();
}

function addButtons(btns){
  var wrap=document.createElement("div");
  wrap.className="quick-btns";
  for(var i=0;i<btns.length;i++){
    var btn=document.createElement("button");
    btn.className="quick-btn";
    btn.textContent=btns[i].label;
    btn.onclick=btns[i].action;
    wrap.appendChild(btn);
  }
  document.getElementById("messages").appendChild(wrap);
  scrollToBottom();
}

function showTyping(){document.getElementById('typing').classList.add('show');}
function hideTyping(){document.getElementById('typing').classList.remove('show');}
function scrollToBottom(){var m=document.getElementById("messages");setTimeout(function(){m.scrollTop=m.scrollHeight;},50);}

function showComparePanel(product){
  var discount=Math.round((1-product.price/product.official)*100);
  var saveMoney=(product.official-product.price).toFixed(1);
  var html='<div class="compare-panel">';
  html+='<div class="compare-title">📊 价格对比 <span class="badge">省'+discount+'%</span></div>';
  html+='<div class="compare-row"><span class="compare-label">官方价</span><span class="compare-official">¥'+product.official+'</span></div>';
  html+='<div class="compare-row"><span class="compare-label">'+PLATFORM_NAME+'价</span><span class="compare-platform">¥'+product.price+'</span></div>';
  html+='<div class="compare-row"><span class="compare-label">节省</span><span class="compare-save">¥'+saveMoney+'</span></div>';
  html+='</div>';
  addBotMsg(html,true);
}

function showProducts(list,title){
  if(list.length===0){addBotMsg("😢 暂无符合条件的权益商品",true);return;}
  var html=title?'<div style="margin:8px 0 12px;font-weight:600;color:#FF6B6B">'+title+'</div>':'';
  for(var i=0;i<list.length&&i<5;i++){
    var p=list[i];
    var hotTag=p.hot?'<span class="tag hot">🔥 热卖</span>':'';
    var recTag=p.recommend?'<span class="tag recommend">⭐ '+p.recommend+'</span>':'';
    var saveMoney=(p.official-p.price).toFixed(1);
    html+='<div class="product-card">';
    html+='<div class="product-name">'+p.name+hotTag+recTag+'</div>';
    html+='<div class="price-compare"><span class="official">官方价 ¥'+p.official+'</span><span class="save">省¥'+saveMoney+'</span></div>';
    html+='<div class="product-price">'+p.price+'元 <span>/'+p.period+'</span></div>';
    html+='<div class="product-desc">'+p.desc+'</div>';
    html+='<div class="product-tags"><span class="tag">'+p.sub+'</span><span class="tag">'+p.period+'</span></div>';
    html+='<div class="product-footer">';
    html+='<button class="compare-btn" onclick="showComparePanel(PRODUCTS.find(x=>x.id===\''+p.id+'\'))">📊 比价</button>';
    html+='<button class="order-btn" onclick="openQR()">🎫 咨询购买</button>';
    html+='</div></div>';
  }
  if(list.length>5)html+='<p style="text-align:center;color:#999;font-size:12px">还有 '+(list.length-5)+' 款更多商品...</p>';
  addBotMsg(html,true);
}

async function chatWithAI(userMessage){
  showTyping();
  conversationHistory.push({role:'user',content:userMessage});
  try{
    var response=generateSmartReply(userMessage);
    hideTyping();
    conversationHistory.push({role:'assistant',content:response});
    addBotMsg(response,true);
  }catch(e){
    hideTyping();
    addBotMsg("😅 抱歉，AI服务暂时不可用，请换个问题或联系润石~",true);
  }
}

function generateSmartReply(userMessage){
  var t=userMessage.toLowerCase();
  
  if(/热门|推荐|最好|划算|想要/.test(t)){
    var hot=PRODUCTS.filter(p=>p.hot).sort((a,b)=>b.score-a.score);
    var reply='🔥 <b>为您推荐以下热门商品：</b><br><br>';
    for(var i=0;i<3;i++){
      var p=hot[i];
      reply+='• <b>'+p.name+'</b> - ¥'+p.price+'（省¥'+(p.official-p.price).toFixed(1)+'）';
      if(p.recommend)reply+=' '+p.recommend;
      reply+='<br>';
    }
    reply+='<br>点击下方「咨询购买」扫码联系润石下单~';
    return reply;
  }
  
  if(/价格|多少钱|便宜|优惠/.test(t)){
    for(var p of PRODUCTS){
      if(t.indexOf(p.sub.toLowerCase())>=0||t.indexOf(p.name.toLowerCase())>=0){
        return '💰 <b>'+p.name+'</b><br>• '+PLATFORM_NAME+'价：¥'+p.price+'<br>• 官方价：¥'+p.official+'<br>• 节省：¥'+(p.official-p.price).toFixed(1)+' ('+Math.round((1-p.price/p.official)*100)+'%折扣)<br><br>点击咨询购买，扫码联系润石~';
      }
    }
    return '💰 我们所有商品都是全网低价！<br>比如：<br>• 爱奇艺月卡 ¥15.8（官方¥25）<br>• 美团外卖券包 ¥35（官方¥50）<br>• 网易云年卡 ¥78（官方¥158）<br><br>想要什么商品的报价？直接告诉我~';
  }
  
  if(/怎么|使用|充值|开通/.test(t)){
    return '📖 <b>购买流程：</b><br>1️⃣ 选择想要的商品<br>2️⃣ 点击「咨询购买」扫码联系润石<br>3️⃣ 付款后获得卡密/兑换码<br>4️⃣ 在对应App输入卡密即可<br><br>⏰ <b>到账时间：</b>会员类1-30分钟，话费24小时内，卡密即时发货';
  }
  
  if(/售后|失败|退款|退换|问题/.test(t)){
    return '🛡️ <b>我们提供完善的售后服务：</b><br>• 充值失败 → 核实后补发或退款<br>• 卡密无效 → 免费重新发送<br>• 未到账 → 联系润石查询处理<br><br>如有售后问题，扫码联系润石处理~';
  }

function showSimpleMode(){
  addBotMsg('📋 <b>快捷选卡模式</b><br>点击分类快速浏览商品',false);
  var categories=[
    {name:'🎬 视频会员',cat:'视频会员'},
    {name:'🍜 外卖餐饮',cat:'外卖餐饮'},
    {name:'🎵 音乐会员',cat:'音乐会员'},
    {name:'🚗 生活服务',cat:'生活服务'},
    {name:'📝 办公效率',cat:'办公效率'},
    {name:'🎮 游戏娱乐',cat:'游戏娱乐'}
  ];
  var btns=categories.map(function(c){
    return{
      label:c.name,
      action:(function(cat){
        return function(){
          var list=PRODUCTS.filter(p=>p.category===cat).sort((a,b)=>b.score-a.score);
          addBotMsg('📦 <b>'+cat+'</b>（共'+list.length+'款）',false);
          showProducts(list);
        };
      })(c.cat)
    };
  });
  addButtons(btns);
}

function handleSend(){
  var input=document.getElementById("userInput");
  var text=input.value.trim();
  if(!text)return;
  input.value="";
  addUserMsg(text);
  if(currentMode==='ai'){
    chatWithAI(text);
  }else{
    var results=PRODUCTS.filter(function(p){
      return p.name.toLowerCase().indexOf(text.toLowerCase())>=0||p.sub.toLowerCase().indexOf(text.toLowerCase())>=0||p.category.toLowerCase().indexOf(text.toLowerCase())>=0;
    });
    if(results.length>0){
      addBotMsg('🔍 找到 <b>'+results.length+'</b> 个相关商品：',false);
      showProducts(results);
    }else{
      addBotMsg('😢 没有找到相关商品，试试其他关键词~',false);
    }
  }
}

document.getElementById("sendBtn").onclick=handleSend;
document.getElementById("userInput").onkeydown=function(e){if(e.key==="Enter")handleSend();};
